<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Friends | Convoy</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <aside class="sidebar">
    <div class="brand">
      <img src="./Convoy.jpg" alt="Convoy logo" class="logo" />
      <div>
        <h1>Convoy</h1>
        <p>Travel together.</p>
      </div>
    </div>

<nav class="side-nav">
  <a class="nav-link" href="/dashboard.html">Dashboard</a>

  <a class="nav-link" href="/convoys.html" data-notify="convoys">
    Convoys
    <span class="notification-dot hidden"></span>
  </a>

  <a class="nav-link active" href="/friends.html" data-notify="friends">
    Friends
    <span class="notification-dot hidden"></span>
  </a>

  <a class="nav-link" href="/messages.html" data-notify="messages">
    Messages
    <span class="notification-dot hidden"></span>
  </a>
</nav>

    <div class="sidebar-footer">
      <p id="currentUser" class="current-user"></p>
      <button id="logoutBtn" type="button" class="ghost-btn">Logout</button>
    </div>
  </aside>
  <main class="app-main">
    <section class="page-header">
      <p class="eyebrow">Convoy App</p>
      <h2>Friends</h2>
      <p>Add friends, review requests, and manage your contact list.</p>
    </section>
    <section class="content-grid">
      <article class="card wide-card">
        <h3>Add a Friend</h3>
        <form id="friendRequestForm" class="stack inline-form">
          <input id="friendUsername" placeholder="Friend username" required />
          <button type="submit">Send Request</button>
        </form>
        <div class="row gap small-top wrap">
          <button id="showFriendsBtn" type="button">Show Friends</button>
          <button id="showRequestsBtn" type="button">Show Requests</button>
          <button id="toggleBlockedBtn" type="button">Show Blocked Users</button>
        </div>
        <p id="friendResult" class="result"></p>
      </article>
      <article class="card">
        <h3>Friends</h3>
        <div id="friendsList" class="list-box"></div>
      </article>
      <article class="card">
        <h3>Requests</h3>
        <div id="requestsList" class="list-box"></div>
      </article>
    </section>
  </main>
  <script type="module" src="/js/app.js"></script>
</body>
</html>
