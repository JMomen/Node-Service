<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Convoy</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="login-body">
  <main class="login-shell">
    <section class="login-hero">
      <img src="./Convoy.jpg" alt="Convoy logo" class="logo large-logo" />
      <p class="eyebrow">Convoy App</p>
      <h1>Ride together. Stay connected.</h1>
      <p>Create convoys, message friends, and share GPS location in one simple app.</p>
    </section>

    <section class="login-grid">
      <article class="card">
        <h3>Create User</h3>
        <form id="registerForm" class="stack">
          <input id="regUserName" placeholder="Username" required />
          <input id="regFirstName" placeholder="First name" required />
          <input id="regLastName" placeholder="Last name" required />
          <input id="regEmail" type="email" placeholder="Email" required />
          <input id="regPassword" type="password" placeholder="Password" required />
          <button type="submit">Create User</button>
        </form>
        <p id="registerResult" class="result"></p>
      </article>

      <article class="card">
        <h3>Login</h3>
        <form id="loginForm" class="stack">
          <input id="loginUserName" placeholder="Username" required />
          <input id="loginPassword" type="password" placeholder="Password" required />
          <button type="submit">Login</button>
        </form>
        <p id="loginResult" class="result"></p>
        <p id="currentUser" class="current-user">Not logged in.</p>
      </article>
    </section>
  </main>
  <script type="module" src="/js/app.js"></script>
</body>
</html>
