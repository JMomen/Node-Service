<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard | Convoy</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <aside class="sidebar">
    <div class="brand">
      <img src="./Convoy.jpg" alt="Convoy logo" class="logo" />
      <div>
        <h1>Convoy</h1>
        <p>Travel together.</p>
      </div>
    </div>
    <nav class="side-nav">
      <a class="nav-link active" href="/dashboard.html">Dashboard</a>
<a class="nav-link " href="/convoys.html">Convoys</a>
<a class="nav-link " href="/friends.html">Friends</a>
<a class="nav-link " href="/messages.html">Messages</a>
    </nav>
    <div class="sidebar-footer">
      <p id="currentUser" class="current-user"></p>
      <button id="logoutBtn" type="button" class="ghost-btn">Logout</button>
    </div>
  </aside>
  <main class="app-main">
    <section class="page-header">
      <p class="eyebrow">Convoy App</p>
      <h2>Dashboard</h2>
      <p>View your profile, active convoys, and friends in one quick overview.</p>
    </section>
    <section class="content-grid dashboard-grid">
      <article class="card profile-card">
        <h3>User Information</h3>
        <p id="dashboardUserInfo" class="big-user">Loading user...</p>
      </article>

      <article class="card">
        <h3>Current Active Convoys</h3>
        <p id="convoyResult" class="result"></p>
        <label for="activeConvoySelect">Active convoy</label>
        <select id="activeConvoySelect"></select>
        <div id="membersList" class="list-box compact-list"></div>
        <div id="gpsList" class="hidden"></div>
      </article>

      <article class="card">
        <h3>Quick Friends List</h3>
        <div id="friendsList" class="list-box compact-list"></div>
        <div id="requestsList" class="hidden"></div>
      </article>
    </section>
  </main>
  <script type="module" src="/js/app.js"></script>
</body>
</html>
